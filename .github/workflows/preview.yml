name: Preview Deploy + Smoke Test

on:
  pull_request:
    branches:
      - master

permissions:
  pull-requests: write
  contents: read

jobs:
  preview:
    runs-on: ubuntu-latest
    outputs:
      deploy_url: ${{ steps.deploy.outputs.deploy_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy Preview
        id: deploy
        run: |
          DEPLOY_URL=$(vercel deploy --token=${{ secrets.VERCEL_TOKEN }} --yes 2>&1 | grep -oP 'https://[^\s]+\.vercel\.app' | head -1)
          echo "deploy_url=$DEPLOY_URL" >> $GITHUB_OUTPUT
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  smoke-test:
    needs: preview
    runs-on: ubuntu-latest
    steps:
      - name: Smoke Tests
        id: test
        run: |
          URL="${{ needs.preview.outputs.deploy_url }}"
          echo "=== 忆往昔功能测试开始 ==="
          echo "目标: $URL"
          echo ""

          PASS=0
          FAIL=0
          REPORT=""

          test_endpoint() {
            local name="$1"
            local method="$2"
            local endpoint="$3"
            local expected="$4"

            HTTP_CODE=$(curl -s -o /tmp/resp.txt -w "%{http_code}" -X "$method" "$URL$endpoint" --max-time 10)
            BODY=$(cat /tmp/resp.txt | tr -d '\n' | head -c 200)

            if echo "$BODY" | grep -q "$expected"; then
              PASS=$((PASS + 1))
              REPORT="${REPORT}| $name | \`$method $endpoint\` | ✅ $HTTP_CODE |"
            else
              FAIL=$((FAIL + 1))
              REPORT="${REPORT}| $name | \`$method $endpoint\` | ❌ $HTTP_CODE |"
            fi
            REPORT="${REPORT}\n"
          }

          test_http() {
            local name="$1"
            local endpoint="$2"

            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$URL$endpoint" --max-time 10)
            if [ "$HTTP_CODE" = "200" ]; then
              PASS=$((PASS + 1))
              REPORT="${REPORT}| $name | \`GET $endpoint\` | ✅ $HTTP_CODE |"
            else
              FAIL=$((FAIL + 1))
              REPORT="${REPORT}| $name | \`GET $endpoint\` | ❌ $HTTP_CODE |"
            fi
            REPORT="${REPORT}\n"
          }

          REPORT="| 测试项 | 端点 | 结果 |\n|--------|------|------|\n"

          # 健康检查
          test_endpoint "Health" "GET" "/api/health" "ok"

          # 前端页面
          test_http "首页" "/"

          # OSS API 端点存在性
          test_http "OSS Sign" "/api/oss/sign"
          test_http "OSS Download" "/api/oss/download"
          test_http "OSS List" "/api/oss/list"

          # 电信 API
          test_http "Telecom Token" "/api/telecom/token"

          TOTAL=$((PASS + FAIL))
          echo ""
          echo "=== 测试完成: $PASS/$TOTAL 通过 ==="

          {
            echo "report<<EOF"
            echo -e "$REPORT"
            echo ""
            echo "**$PASS/$TOTAL 通过** | **$FAIL 失败**"
            echo EOF
          } >> $GITHUB_OUTPUT

          # 如果有失败，exit 非零让 job 标记为 failure（但不阻塞 PR）
          if [ "$FAIL" -gt 0 ]; then
            echo "⚠️ 有测试失败，请检查"
            exit 1
          fi

      - name: Comment Test Results
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const deploy_url = '${{ needs.preview.outputs.deploy_url }}'
            const report = `${{ steps.test.outputs.report }}`

            const body = `🧪 **功能冒烟测试报告**

            🔗 预览链接: ${deploy_url}

            ${report}

            > 🤖 自动化测试机器人 — 每次 PR 自动执行`

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            })

  comment:
    needs: [preview, smoke-test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Summary
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const url = '${{ needs.preview.outputs.deploy_url }}'
            const body = `🚀 **预览部署已就绪**

            🔗 **预览链接**: ${url}
            🧪 功能测试已在评论区

            > 此链接为临时预览地址，PR 合并后自动销毁。`

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            })
