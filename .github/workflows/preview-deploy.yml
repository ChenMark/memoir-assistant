name: Preview Deploy + Smoke Test

on:
  pull_request:
    branches:
      - master

permissions:
  pull-requests: write
  contents: read

jobs:
  test:
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  preview:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      deploy_url: ${{ steps.deploy.outputs.deploy_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: |
          npm install
          cd server && npm install

      - name: Prisma Generate
        working-directory: server
        run: npx prisma generate

      - name: Build
        run: npm run build

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy Preview
        id: deploy
        run: |
          DEPLOY_URL=$(vercel deploy --token=${{ secrets.VERCEL_TOKEN }} --yes 2>&1 | grep -oP 'https://[^\s]+\.vercel\.app' | head -1)
          echo "deploy_url=$DEPLOY_URL" >> $GITHUB_OUTPUT
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  smoke-test:
    needs: preview
    runs-on: ubuntu-latest
    steps:
      - name: Smoke Tests
        id: test
        run: |
          URL="${{ needs.preview.outputs.deploy_url }}"
          echo "=== 忆往昔 smoke test ==="
          echo "Target: $URL"
          
          PASS=0
          FAIL=0
          
          test_endpoint() {
            local name="$1" method="$2" endpoint="$3" expected="$4"
            HTTP_CODE=$(curl -s -o /tmp/resp.txt -w "%{http_code}" -X "$method" "$URL$endpoint" --max-time 10)
            BODY=$(cat /tmp/resp.txt | tr -d '\n' | head -c 200)
            if echo "$BODY" | grep -q "$expected"; then
              PASS=$((PASS + 1))
              echo "  ✅ $name ($HTTP_CODE)"
            else
              FAIL=$((FAIL + 1))
              echo "  ❌ $name ($HTTP_CODE) — body=${BODY:0:80}"
            fi
          }
          
          test_http() {
            local name="$1" endpoint="$2"
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$URL$endpoint" --max-time 10)
            if [ "$HTTP_CODE" = "200" ]; then
              PASS=$((PASS + 1))
              echo "  ✅ $name ($HTTP_CODE)"
            else
              FAIL=$((FAIL + 1))
              echo "  ❌ $name ($HTTP_CODE)"
            fi
          }
          
          test_endpoint "Health" "GET" "/api/health" "ok"
          test_http "Homepage" "/"
          test_http "OSS Sign" "/api/oss/sign"
          test_http "OSS Download" "/api/oss/download"
          test_http "OSS List" "/api/oss/list"
          
          echo ""
          echo "=== $PASS/$((PASS+FAIL)) passed ==="
          
          if [ "$FAIL" -gt 0 ]; then
            exit 1
          fi

      - name: Comment Results
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `🧪 **Smoke Test**\n🔗 Preview: ${{ needs.preview.outputs.deploy_url }}\n✅ All checks passed`
            })
